# simulations/validation-smoke.yaml — Quick validation: 1 judge × 1 style × 3 runs
# ~90s per case, used for Phase 1 rapid iteration
simulation:
  case_ref: "validation"
  language: "it"

  judge_profiles:
    - id: "formalista_neutro"
      jurisprudential_orientation: "neutral"
      formalism: "high"

  appellant_profiles:
    - id: "tecnico"
      style: |
        Concentrati sui vizi giuridici della decisione impugnata e sulla lettera
        della legge. Argomentazione analitica e testuale.

  temperature:
    appellant: 0.5
    respondent: 0.4
    judge: 0.3

  runs_per_combination: 3
