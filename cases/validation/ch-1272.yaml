        - D1
      - id: SEED_ARG2
        claim: Incompetenza territoriale del Pretore di Locarno
        direction: accoglimento appello
        references_facts:
        - F1
        - D2
      controparte:
      - id: SEED_RARG1
        claim: Legittimazione passiva della convenuta e competenza territoriale del
          Pretore di Locarno
        direction: rigetto ricorso
        references_facts:
        - F1
        - F3
  timeline:
  - date: '2003-02-07'
    event: Azione intentata da X._ contro A._ dinanzi al Pretore di Locarno-Città
  - date: '2003-10-09'
    event: Sentenza del Pretore che rigetta le eccezioni di legittimazione e competenza
  - date: '2004-12-09'
