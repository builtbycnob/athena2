    litigation_cost_estimate: 2000
    non_monetary: Determinazione della legittimazione passiva della convenuta (responsabilità
      personale vs rappresentanza societaria) e della competenza territoriale del
      giudice svizzero in una controversia contrattuale internazionale.
  evidence:
  - id: DOC1
    type: contratto
    description: Documentazione relativa agli ordini di stampa del 2001 e alla stipula
      dei contratti.
    produced_by: controparte
    admissibility: uncontested
    supports_facts:
    - D1
  facts:
    undisputed:
    - id: F1
      description: Il 7 febbraio 2003 la società tedesca X._ ha convenuto A._ dinanzi
        al Pretore della Giurisdizione di Locarno-Città con un'azione volta al pagamento
        di fr. 176'136.--, oltre interessi, a titolo di mercede per la ristampa di
        un libro e la stampa di due calendari dell'avvento, quest'ultimi ordinati
        nel 2001.
      evidence: []
    - id: F2
      description: La procedura è stata limitata all'esame delle eccezioni di legittimazione
        passiva e competenza territoriale, entrambe rigettate con sentenza del 9 ottobre
        2003.
      evidence: []
    - id: F3
      description: L'appello introdotto dalla soccombente è stato respinto il 9 dicembre
        2004 dalla II Camera civile del Tribunale d'appello del Cantone Ticino.
      evidence: []
    disputed:
    - id: D1
      description: Se la convenuta A._ abbia concluso i contratti quale rappresentante
        della società a garanzia limitata Y._ o a titolo personale.
      depends_on_facts:
      - F1
      positions:
        ricorrente: La convenuta sostiene di aver agito come rappresentante della
          società Y._ e non a titolo personale, contestando la propria legittimazione
          passiva.
        controparte: L'attrice sostiene che la convenuta non ha dimostrato di aver
          agito come rappresentante, assumendo quindi la responsabilità personale.
    - id: D2
      description: Se esista una valida clausola di proroga di giurisdizione che escluda
        la competenza del Pretore di Locarno.
      depends_on_facts:
      - F1
      positions:
        ricorrente: La convenuta sostiene l'esistenza di una clausola di proroga di
          giurisdizione che avrebbe dovuto escludere la competenza del giudice adito.
        controparte: L'attrice sostiene l'assenza di una valida clausola di proroga
          di giurisdizione conforme all'art. 17 CL.
  legal_texts:
  - id: norm_1
    norm: art. 17 CL
    text: '[Testo da fedlex.admin.ch: art. 17 CL]'
  - id: norm_2
    norm: art. 2 CL
    text: '[Testo da fedlex.admin.ch: art. 2 CL]'
  seed_arguments:
    by_party:
      ricorrente:
      - id: SEED_ARG1
        claim: Carenza di legittimazione passiva della convenuta
        direction: accoglimento appello
        references_facts:
