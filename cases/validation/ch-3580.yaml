    produced_by: controparte
    admissibility: uncontested
    supports_facts:
    - F3
    - F4
  facts:
    undisputed:
    - id: F1
      description: C._, cittadina tedesca domiciliata a X._, è deceduta il 13 agosto
        2003 lasciando quale unica erede legittima la figlia B._.
      evidence:
      - DOC1
    - id: F2
      description: Il 26 aprile 2003 C._ ha redatto un testamento olografo istituendo
        A._ come erede universale e diseredando la figlia B._.
      evidence:
      - DOC1
    - id: F3
      description: Il Pretore di Locarno Campagna ha annullato il testamento del 26
        aprile 2003 con sentenza 11 febbraio 2011, dichiarando B._ unica erede.
      evidence:
      - DOC2
    - id: F4
      description: La I Camera civile del Tribunale d'appello del Cantone Ticino ha
        confermato la decisione pretorile con sentenza 30 luglio 2012.
      evidence:
      - DOC2
    disputed:
    - id: D1
      description: Validità del testamento olografo del 26 aprile 2003 e legittimità
        della diseredazione della figlia B._.
      depends_on_facts:
      - F1
      - F2
      - F3
      positions:
        ricorrente: Il testamento del 26 aprile 2003 è valido e A._ deve essere riconosciuta
          come unica erede universale.
        controparte: Il testamento del 26 aprile 2003 deve essere annullato e B._
          deve essere riconosciuta come unica erede legittima.
  legal_texts: []
  seed_arguments:
    by_party:
      ricorrente:
      - id: SEED_ARG1
        claim: Il testamento olografo del 26 aprile 2003 è valido e deve essere fatto
          valere, annullando la decisione pretorile.
        direction: annullamento
        references_facts:
        - F1
        - D1
      controparte:
      - id: SEED_RARG1
        claim: Il testamento del 26 aprile 2003 è nullo e la figlia B._ deve essere
          riconosciuta come unica erede legittima.
        direction: conferma
        references_facts:
        - F1
  timeline:
