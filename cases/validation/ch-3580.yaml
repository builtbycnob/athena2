    litigation_cost_estimate: 2000
    non_monetary: Determinazione della validità di un testamento olografo successivo
      e della conseguente attribuzione della qualifica di erede universale, in contrasto
      con la diseredazione della figlia legittima.
  evidence:
  - id: DOC1
    type: testamento_olografo
    description: Testamento olografo del 26 aprile 2003 redatto da C._
    produced_by: ricorrente
    admissibility: uncontested
    supports_facts:
    - F2
  - id: DOC2
    type: sentenza_giudiziaria
    description: Sentenza del Pretore di Locarno Campagna del 11 febbraio 2011 e sentenza
