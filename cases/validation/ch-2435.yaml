    non_monetary: Determinazione dell'importo dovuto dalla banca al cliente per perdite
      subite su conti swap e gestione amministrativa, oltre alla questione della responsabilità
      per la mancanza di rendicontazione.
  evidence: []
  facts:
    undisputed:
    - id: F1
      description: Nel 1992 il cittadino italiano A. ha aperto i conti xxx e yyy presso
        la succursale di Lugano di B.B._SA, concedendo una procura amministrativa
        a C., funzionario della succursale milanese di D.B._.
      evidence: []
    - id: F2
      description: Nel 1993 A. ha aperto un conto yyy presso la succursale di Zurigo
        di D.B._, su cui C. ha agito quale procuratore amministrativo.
      evidence: []
    - id: F3
      description: Tra il 1997 e il 1998 il patrimonio di A. ha subito diminuzioni
        rilevanti.
      evidence: []
    - id: F4
      description: Il 11 febbraio 2000 A. ha adito la Pretura del Distretto di Lugano
        chiedendo la condanna al pagamento di fr. 1'035'964.-- e la presentazione
        di un rendiconto dettagliato.
      evidence: []
    - id: F5
      description: Il Pretore ha respinto la petizione il 27 agosto 2007.
      evidence: []
    - id: F6
      description: La II Camera civile del Tribunale d'appello del Cantone Ticino
        ha accolto parzialmente l'appello con sentenza del 3 febbraio 2009, riconoscendo
        a A. il diritto a Euro 26'590.75, US$ 5'000.-- e fr. 2'874.40 oltre interessi.
      evidence: []
    - id: F7
      description: Il 6 marzo 2009 A. ha proposto ricorso al Tribunale federale chiedendo
        la modifica della sentenza cantonale.
      evidence: []
    disputed:
    - id: D1
      description: L'entità delle perdite subite da A. e la conseguente responsabilità
        della banca per la gestione dei conti.
      depends_on_facts:
      - F1
      - F2
      - F3
      - F6
      positions:
        ricorrente: La banca deve essere condannata al pagamento di importi significativi
          in diverse valute (fr. 1'064.--, US$ 16'743.85, GB£ 105'559.--, AU$ 41'329.--,
          Euro 173'150.90, US$ 75'000.--, fr. 43'116.--) con interessi al 5%.
        controparte: La sentenza cantonale è corretta e il gravame deve essere respinto.
