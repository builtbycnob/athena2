        - memoria_ricorso
        - replica
        - produzione_documenti
        respondent:
        - risposta
        - duplica
        - produzione_documenti
  key_precedents: []
  parties:
  - id: ricorrente
    role: appellant
    type: persona_fisica
    objectives:
      primary: accoglimento_ricorso
      subordinate: rinvio_istanza_inferiore
  - id: controparte
    role: respondent
    type: autorita_cantonale
    objectives:
      primary: rigetto_ricorso
      subordinate: conferma_decisione_impugnata
  stakes:
    current_sanction:
      norm: decisione impugnata
      fine_range:
      - 0
      - 0
