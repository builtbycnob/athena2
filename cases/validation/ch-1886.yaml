    litigation_cost_estimate: 2000
    non_monetary: Determinazione della percentuale di responsabilità del medico per
      complicazioni postoperatorie in un intervento di osteotomia su paziente con
      malformazione congenita, e quantificazione della perdita di guadagno e dell'indennità
      per torto morale.
  evidence:
  - id: DOC1
    type: sentenza_pretorile
    description: Sentenza del Pretore del Distretto di Lugano del 13 ottobre 2005
      che ha riconosciuto la responsabilità del medico.
    produced_by: ricorrente
    admissibility: uncontested
    supports_facts:
    - F4
  - id: DOC2
    type: sentenza_appello
    description: Sentenza della II Camera civile del Tribunale d'appello del Cantone
      Ticino del 5 dicembre 2006 che ha ridotto il risarcimento.
    produced_by: controparte
    admissibility: uncontested
    supports_facts:
    - F5
  - id: DOC3
    type: risultanze_peritali
    description: Relazioni peritali attestanti l'importante predisposizione costituzionale
      dell'attore, utilizzate per imputare solo il 30% del danno al medico.
    produced_by: controparte
    admissibility: uncontested
    supports_facts:
    - F5
  facts:
    undisputed:
    - id: F1
      description: Nell'estate del 1995 A._ si è rivolto al dr. med. B._ per dolori
        al ginocchio destro, conseguenti a una caduta e a una meniscesctomia parziale
        del novembre 1994. Il paziente presentava una malformazione congenita (arto
        destro più corto di 3 cm e valgo di 11°). Il medico ha proposto un'osteotomia
        varizzante e allungamento della tibia destra, intervento eseguito il 9 agosto
        1995.
      evidence: []
    - id: F2
      description: In seguito a complicazioni postoperatorie, A._ ha subito due ulteriori
        operazioni senza risultati auspicati. L'Ufficio assicurazioni invalidità ha
        riconosciuto un grado d'invalidità del 50% dal 1° luglio 1996 e del 75% dal
        1° agosto 1997.
      evidence: []
    - id: F3
      description: Il 16 luglio 2001 A._ ha convenuto B._ dinanzi alla Pretura del
        Distretto di Lugano chiedendo fr. 335'284.20 (danni materiali, perdita di
        guadagno 1998-2008, torto morale).
      evidence: []
    - id: F4
      description: La sentenza pretorile del 13 ottobre 2005 ha riconosciuto la responsabilità
        del medico, concedendo fr. 197'600.-- (perdita di guadagno fino al 2006 e
        torto morale).
      evidence: []
    - id: F5
      description: La sentenza della II Camera civile del Tribunale d'appello del
        Cantone Ticino del 5 dicembre 2006 ha riformato la pronuncia pretorile, riducendo
        il danno attribuibile al medico al 30% (quantificato in fr. 16'900.-- annui)
        e limitando il rimborso della perdita di guadagno fino al pensionamento (2003),
        confermando l'indennità per torto morale e stabilendo un totale di fr. 34'363.75.
      evidence: []
    disputed:
    - id: D1
      description: Quantificazione del danno e percentuale di imputabilità della responsabilità
        al medico, nonché durata della perdita di guadagno risarcibile.
      depends_on_facts:
      - F1
      - F2
      - F5
      positions:
        ricorrente: A._ sostiene che la sentenza d'appello abbia errato nel limitare
          l'imputabilità al 30% e nel ridurre la perdita di guadagno fino al 2003,
          chiedendo l'aumento della somma a fr. 168'766.--.
        controparte: B._ ha proposto la reiezione del gravame, sostenendo la correttezza
          della sentenza d'appello che ha correttamente imputato al medico solo una
          parte del danno e limitato il risarcimento temporale.
  legal_texts:
  - id: norm_1
    norm: art. 42 CO
    text: '[Testo da fedlex.admin.ch: art. 42 CO]'
  - id: norm_2
    norm: art. 44 CO
    text: '[Testo da fedlex.admin.ch: art. 44 CO]'
  - id: norm_3
    norm: art. 46 CO
    text: '[Testo da fedlex.admin.ch: art. 46 CO]'
  - id: norm_4
    norm: art. 47 CO
    text: '[Testo da fedlex.admin.ch: art. 47 CO]'
  seed_arguments:
    by_party:
      ricorrente:
      - id: SEED_ARG1
        claim: Riforma della sentenza d'appello per aumentare il risarcimento a fr.
          168'766.--
        direction: a favore del ricorrente
        references_facts:
        - F1
        - F2
        - F5
        - D1
      controparte:
      - id: SEED_RARG1
        claim: Reiezione del gravame e conferma della sentenza d'appello
        direction: a favore della controparte
        references_facts:
        - F5
  timeline:
  - date: 1994-11
    event: Esecuzione di una meniscesctomia parziale mediale e laterale.
  - date: '1995-08-09'
    event: Esecuzione dell'intervento chirurgico di osteotomia varizzante e allungamento
      della tibia destra.
  - date: '1996-07-01'
    event: Riconoscimento da parte dell'Ufficio assicurazioni invalidità di un grado
      d'invalidità del 50%.
  - date: '1997-08-01'
    event: Aumento del grado d'invalidità al 75%.
  - date: '2001-07-16'
    event: Azione legale di A._ contro B._ dinanzi alla Pretura di Lugano.
  - date: '2005-10-13'
    event: Sentenza pretorile che riconosce la responsabilità del medico e concede
      fr. 197'600.--.
  - date: '2006-12-05'
    event: Sentenza d'appello che riduce il risarcimento a fr. 34'363.75.
  - date: '2007-03-22'
    event: Risposta di B._ alla richiesta di riforma di A._ dinanzi al Tribunale Federale.
  id: ch-1886
