    litigation_cost_estimate: 2000
    non_monetary: Determinazione dell'importo dovuto per danni derivanti da ritardo
      nella consegna e minor valore dell'opera di ristrutturazione alberghiera, nonché
      ripartizione delle spese processuali.
  evidence: []
  facts:
    undisputed:
    - id: F1
      description: Nel 1993 B. ha affidato all'arch. A. la progettazione e la direzione
        dei lavori di ristrutturazione di un albergo a Lugano.
      evidence: []
    - id: F2
      description: I lavori sono iniziati nell'ottobre 1994 e sono terminati alla
        fine del mese di settembre 1995.
      evidence: []
    - id: F3
      description: Il 18 ottobre 1996 B. ha convenuto in giudizio A. chiedendo il
        pagamento di fr. 3'619'484.10, poi ridotti a fr. 2'902'113.--.
      evidence: []
    - id: F4
      description: Con sentenza 30 ottobre 2008 il Pretore ha respinto la petizione
        di B. e ha accolto la domanda riconvenzionale di A. limitatamente a fr. 274'942.30,
        oltre accessori.
      evidence: []
    - id: F5
      description: Con sentenza 17 febbraio 2011 la II Camera civile del Tribunale
        di appello del Cantone Ticino ha parzialmente accolto la petizione, condannando
        A. a versare fr. 459'123.35 e riducendo a fr. 146'595.-- l'importo che B.
        deve versare ad A.
      evidence: []
    disputed:
    - id: D1
      description: L'entità del danno conseguente al ritardo nella consegna dell'opera
        e del minor valore dell'opera.
      depends_on_facts:
      - F1
      - F2
      - F5
      positions:
        ricorrente: Il ricorrente (A.) contesta gli importi messi a suo carico per
          il ritardo nella consegna e il minor valore dell'opera, chiedendo che la
          petizione sia accolta solo per fr. 9'623.35.
        controparte: La controparte (B.) ha proposto la reiezione del ricorso, sostenendo
          la correttezza delle valutazioni della Corte cantonale sui danni.
  legal_texts: []
  seed_arguments:
    by_party:
      ricorrente:
      - id: SEED_ARG1
        claim: Riforma della sentenza impugnata limitando l'accoglimento della petizione
          a fr. 9'623.35 e contestando i calcoli del danno per ritardo e minor valore.
        direction: a favore del ricorrente
        references_facts:
        - F5
        - D1
      controparte:
      - id: SEED_RARG1
        claim: Reiezione del ricorso in quanto la sentenza di appello è corretta nei
          suoi accertamenti e valutazioni.
        direction: a favore della controparte
        references_facts:
        - F5
