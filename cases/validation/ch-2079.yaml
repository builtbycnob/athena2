case:
  jurisdiction:
    country: CH
    court: bundesgericht
    venue: ti
    applicable_law:
    - Legge sul Tribunale federale (LTF)
    key_precedents: &id001
    - id: prec_1
      citation: Giurisprudenza del Tribunale federale delle assicurazioni
      holding: In caso di malattia dopo la disoccupazione, si presume che l'assicurato
        non eserciterebbe attività; la presunzione è ribaltabile solo se l'assicurato
        dimostra con grado di verosimiglianza preponderante la possibilità di lavoro
        in un posto ben preciso.
      weight: binding
    procedural_rules:
      rite: ricorso_tribunale_federale
      phases:
      - ricorso
      - risposta
      - deliberazione
      - sentenza
      allowed_moves:
        appellant:
        - memoria_ricorso
        - replica
        - produzione_documenti
        respondent:
        - risposta
        - duplica
        - produzione_documenti
  key_precedents: *id001
  parties:
  - id: ricorrente
    role: appellant
    type: persona_fisica
    objectives:
      primary: accoglimento_ricorso
      subordinate: rinvio_istanza_inferiore
  - id: controparte
    role: respondent
    type: autorita_cantonale
    objectives:
      primary: rigetto_ricorso
      subordinate: conferma_decisione_impugnata
  stakes:
    current_sanction:
      norm: decisione impugnata
      fine_range:
      - 0
      - 0
      points_deducted: 0
    alternative_sanction:
      norm: esito favorevole ricorrente
      fine_range:
      - 0
      - 0
      points_deducted: 0
    litigation_cost_estimate: 2000
    non_monetary: Determinazione del diritto dell'assicurato disoccupato e malato
      a percepire indennità giornaliere dopo la scadenza del periodo quadro dell'assicurazione
      contro la disoccupazione, in base alla possibilità dimostrata di rientrare nel
      mercato del lavoro.
  evidence:
  - id: DOC1
    type: scritto_di_dichiarazione
    description: Documento del 18 dicembre 2006 in cui si accerta che B. avrebbe potuto
      lavorare a metà tempo presso la sala giochi D._SA in assenza di malattia.
    produced_by: ricorrente
    admissibility: uncontested
    supports_facts:
    - F7
    - D1
  facts:
    undisputed:
    - id: F1
      description: B. ha lavorato per la ditta C._SA dal 5 luglio 1977 al 31 ottobre
        2004.
      evidence: []
    - id: F2
      description: B. ha sottoscritto il 30 settembre 2004 una proposta di assicurazione
        individuale presso la Cassa malati A._ per il trasferimento dall'assicurazione
        collettiva.
      evidence: []
    - id: F3
      description: Dal 1° novembre 2004 al 31 ottobre 2006 B. è stato iscritto presso
        la cassa disoccupazione Y._ e ha percepito indennità.
      evidence: []
    - id: F4
      description: Il 24 marzo 2006 B. è stato dichiarato inabile al lavoro al 100%
        per sindrome depressiva ricorrente.
      evidence: []
    - id: F5
      description: La Cassa malati A. ha versato indennità giornaliere di fr. 100.--
        a partire dal 24 aprile 2006.
      evidence: []
    - id: F6
      description: Il 18 settembre 2006 la Cassa ha comunicato la cessazione dei versamenti
        a decorrere dal 31 ottobre 2006 per scadenza del termine quadro dell'assicurazione
        contro la disoccupazione.
      evidence: []
    - id: F7
      description: Il 18 dicembre 2006 B. ha prodotto uno scritto attestante la possibilità
        di lavorare a metà tempo presso la sala giochi D._SA in assenza di malattia.
      evidence:
      - DOC1
    - id: F8
      description: L'8 marzo 2007 B. ha convenuto la Cassa dinanzi al Tribunale delle
        assicurazioni del Cantone Ticino per il pagamento di indennità giornaliere
        dal 1° novembre 2006.
      evidence: []
    disputed:
    - id: D1
      description: Se B., in assenza di malattia, avrebbe potuto iniziare a lavorare
        in un posto ben preciso (sala giochi D._SA) dopo la scadenza del periodo quadro
        dell'assicurazione contro la disoccupazione, giustificando così il diritto
        alle indennità giornaliere.
      depends_on_facts:
      - F3
      - F4
      - F6
      - F7
      positions:
        ricorrente: B. sostiene di poter dimostrare con grado di verosimiglianza preponderante
          che, senza la malattia, avrebbe iniziato a lavorare a metà tempo presso
          la sala giochi D._SA.
        controparte: La Cassa sostiene che, in base alla giurisprudenza, vige una
          presunzione che l'assicurato disoccupato non eserciterebbe attività; la
          prova contraria fornita da B. non è stata ritenuta sufficiente a ribaltare
          tale presunzione.
  legal_texts:
  - id: norm_1
    norm: art. 12 n. 9 CGA
    text: '[Testo da fedlex.admin.ch: art. 12 n. 9 CGA]'
  seed_arguments:
    by_party:
      ricorrente:
      - id: SEED_ARG1
        claim: Diritto al pagamento delle indennità giornaliere dal 1° novembre 2006
        direction: pro
        references_facts:
        - F7
        - D1
      controparte:
      - id: SEED_RARG1
        claim: Mancanza di diritto alle prestazioni per scadenza del termine quadro
          e mancata prova della possibilità di lavoro
        direction: contra
        references_facts:
        - F6
        - D1
  timeline:
  - date: '1977-07-05'
    event: Inizio del rapporto di lavoro di B. presso la ditta C._SA
  - date: '2004-09-30'
    event: Sottoscrizione della proposta di assicurazione individuale da parte di
      B.
  - date: '2004-11-01'
    event: Inizio dell'iscrizione di B. presso la cassa disoccupazione Y._
  - date: '2006-03-24'
    event: Dichiarazione di inabilità al lavoro al 100% di B.
  - date: '2006-04-24'
    event: Inizio del versamento delle indennità giornaliere da parte della Cassa
      malati A.
  - date: '2006-09-18'
    event: Comunicazione della Cassa sulla cessazione dei versamenti dal 31 ottobre
      2006
  - date: '2006-12-18'
    event: Produzione dello scritto da parte di B. sulla possibilità di lavoro presso
      la sala giochi D._SA
  - date: '2006-10-31'
    event: Scadenza del periodo quadro dell'assicurazione contro la disoccupazione
  - date: '2007-03-08'
    event: Azione legale di B. contro la Cassa dinanzi al Tribunale delle assicurazioni
      del Cantone Ticino
  id: ch-2079
