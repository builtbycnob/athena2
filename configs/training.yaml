# ATHENA2 Training Configuration
# All hyperparameters pinned for reproducibility.

seed: 42

# ── Baselines ──────────────────────────────────────────────────────

baseline_tfidf:
  max_features: 50000
  ngram_range: [1, 3]
  sublinear_tf: true
  min_df: 5
  classifier: "logistic_regression"
  C: 1.0
  max_iter: 1000

baseline_transformer:
  # Benchmark BOTH encoders; pick winner for all subsequent phases
  encoders:
    - name: "joelniklaus/legal-swiss-roberta-large"
      description: "Swiss-specific, trained on 638K Swiss decisions (3.3B tokens)"
    - name: "joelniklaus/legal-xlm-roberta-large"
      description: "Multilingual, trained on 689GB MultiLegalPile"
  max_length: 512
  batch_size: 8
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  weight_decay: 0.01
  epochs: 3
  warmup_ratio: 0.1
  fp16: false  # MPS doesn't support fp16 training well

# ── Intermediate Reasoning Predictor (was "world model") ──────────

intermediate_reasoning_predictor:
  encoder:
    model_name: "joelniklaus/legal-swiss-roberta-large"  # Winner from Phase 1
    fallback_model: "joelniklaus/legal-xlm-roberta-large"
    max_length: 512
    hidden_size: 1024

  feature_heads:
    # LUPI heads — supervised by privileged info (considerations)
    law_area:
      n_classes: 17
      weight: 0.3
    error_presence:
      n_classes: 2
      weight: 0.3
    reasoning_pattern:
      n_classes: 9
      weight: 0.1
    outcome_granular:
      n_classes: 7
      weight: 0.3

  dynamics:
    # 4-layer MLP: input → 512 → 256 → 128 → 2
    hidden_sizes: [512, 256, 128]
    dropout: 0.1
    activation: "gelu"
    layer_norm: true

  verdict_head:
    n_classes: 2
    loss: "bsce_gra"          # CVPR 2025 — primary
    fallback_loss: "dual_focal"  # ICML 2023 — fallback if BSCE-GRA doesn't converge

  # GAT citation features
  gat:
    enabled: true
    output_dim: 64
    hidden_dim: 16
    n_heads: 4
    dropout: 0.1

  # ── Bleeding-Edge Training Recipe ──
  training:
    batch_size: 8
    gradient_accumulation_steps: 8
    epochs: 10
    max_grad_norm: 1.0

    # LLRD (Howard & Ruder 2018)
    llrd:
      enabled: true
      base_lr: 1.0e-5
      decay_factor: 0.95

    # SupCon pre-training (Khosla et al. 2020)
    supcon:
      enabled: true
      epochs: 2
      lr: 5.0e-5
      temperature: 0.07
      projection_dim: 128

    # BSCE-GRA (CVPR 2025)
    bsce_gra:
      gamma: 1.0
      uncertainty_weight: 0.5
      pos_weight: 2.33  # ~70/30 imbalance

    # FAMO (Liu et al. 2024)
    famo:
      enabled: true
      gamma: 0.01
      lr: 1.0e-3

    # R-Drop (Wu et al. 2021)
    rdrop:
      enabled: true
      alpha: 1.0

    # EMA (Polyak 1992)
    ema:
      enabled: true
      decay: 0.999

    # SAM (Foret et al. 2021) — last 20% of training only
    sam:
      enabled: true
      rho: 0.05
      start_fraction: 0.8  # Start SAM at 80% of training

    # SWA/SWAG (Maddox et al. 2019)
    swa:
      enabled: true
      start_fraction: 0.75  # Start SWA at 75% of training
      swag_max_rank: 20

    # Cosine annealing with warm restarts
    scheduler:
      type: "cosine_warm_restarts"
      T_0: 1  # restart every epoch initially
      T_mult: 2
      warmup_steps: 500
      eta_min: 1.0e-7

    # cleanlab noise handling
    noise:
      enabled: true
      noise_weight: 0.5  # Down-weight noisy samples
      detection_method: "cleanlab"  # or "fallback"

    # Early stopping
    early_stopping:
      patience: 3
      metric: "macro_f1"
      mode: "max"

# ── Calibration ────────────────────────────────────────────────────

calibration:
  primary_metric: "ace"  # Adaptive Calibration Error (ICLR 2025)
  secondary_metric: "ece"  # ECE for reference only

  temperature_scaling:
    grid_min: 0.1
    grid_max: 5.0
    grid_steps: 200

  isotonic:
    enabled: true  # Likely better with >1K samples

  venn_abers:
    enabled: true  # Distribution-free calibration

  conformal:
    # Class-conditional CP (NeurIPS 2025)
    method: "class_conditional"  # not "naive_split"
    target_coverages: [0.90, 0.95]
    calibration_fraction: 0.5
    library: "torchcp"  # or "manual"

  brier:
    n_bins: 15

# ── Experiment Tracking ────────────────────────────────────────────

experiment:
  project: "athena2"
  base_dir: "data/models"
  log_every_n_steps: 50
  eval_every_n_steps: 500
  save_every_n_steps: 1000
  deterministic: true
